[global]
tags = { location = "AdvectTechnologies", environment = "test" }
# ingestor_config = "config/data_config.toml"

[global.status_server]
enabled = false
port = 8081

[global.logging]
level = "INFO"          # DEBUG, INFO, WARNING, ERROR
to_file = true
log_dir = "logs"
retention_days = 7

[global.writer]
output_dir = ".test-data"
batch_size = 100
flush_interval = 30.0

[[sensors]]
type = "random_walk"
name = "test_sensor_1"
measurement = "random_walk"
interval = 10
enabled = true

[[sensors]]
type = "random_walk"
measurement = "random_walk"
name = "test_sensor_2"
interval = 10
enabled = true